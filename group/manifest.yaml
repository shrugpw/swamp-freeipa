manifestVersion: 1
name: "@shrug/freeipa/group"
version: "2026.07.17.1"
description: "Manage FreeIPA user & host groups over the JSON-RPC API: snapshot the inventory, generic user-group CRUD (groupShow/groupAdd/groupMod/groupDel) plus a desired-state groupSync reconcile, ensure the FreeRADIUS radius-vlan-<id> group pair, and add/remove members — idempotent and auditable, with a confirm-guarded delete."

repository: https://github.com/shrugpw/swamp-freeipa

additionalFiles:
  - README.md
  - LICENSE.txt

models:
  - group.ts

# Empty platforms == universal. The model talks HTTPS to the IPA JSON-RPC
# endpoint via fetch(); no host binaries are shelled out, so it runs anywhere.
platforms: []

labels:
  - freeipa
  - identity
  - groups
  - radius
